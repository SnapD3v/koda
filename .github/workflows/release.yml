name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: koda.exe
          - os: macos-latest
            artifact: koda-macos
          - os: ubuntu-latest
            artifact: koda-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller .

      - name: Build
        run: pyinstaller koda.spec --clean --noconfirm

      - name: Rename (non-Windows)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: mv dist/koda dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Вырезаем раздел от "## vX.Y.Z" до следующего "## v" (не включая)
          body=$(awk "/^## v$version/{found=1; next} found && /^## v/{exit} found{print}" CHANGELOG.md)
          if [ -z "$body" ]; then
            body="(нет описания)"
          fi
          # Передаём многострочный текст через $GITHUB_OUTPUT
          {
            echo "body<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Make binaries executable
        run: chmod +x dist/koda-macos dist/koda-linux || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ${{ steps.changelog.outputs.body }}

            ---

            ## Установка

            | Платформа | Файл |
            |-----------|------|
            | Windows   | `koda.exe` |
            | macOS     | `koda-macos` |
            | Linux     | `koda-linux` |

            macOS/Linux: `chmod +x koda-macos && ./koda-macos`

            ## Зависимости (опционально)
            - **mpv** — для стриминга: https://mpv.io/installation/
            - **ffmpeg** — для скачивания серий: https://ffmpeg.org/download.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
